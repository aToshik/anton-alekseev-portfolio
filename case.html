<script>
(function(){
gsap.registerPlugin(ScrollTrigger, ScrollSmoother);

var RM=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(RM){gsap.globalTimeline.timeScale(25);}

var smoother=ScrollSmoother.create({
  wrapper:'#smooth-wrapper',
  content:'#smooth-content',

  effects:true,
  smoothTouch:RM?0:0.1
});

document.getElementById('nav-logo').addEventListener('click',function(){window.location.href='index.html';});

// ── back button ──
document.getElementById('btn-back').addEventListener('click',function(){

  else{window.location.href='index.html';}

// ── custom line-splitter (replaces GSAP SplitText) ──
function splitByLines(el){
  var words=el.textContent.trim().split(/\s+/);
  el.innerHTML=words.map(function(w){
    return'<span class="sl-w" style="display:inline">'+ w +' </span>';
  }).join('');
  var spans=el.querySelectorAll('.sl-w');
  var groups=[],cur=[],lastTop=-Infinity;
  spans.forEach(function(s){
    var top=Math.round(s.getBoundingClientRect().top);
    if(top>lastTop+2){if(cur.length)groups.push(cur);cur=[];lastTop=top;}
    cur.push(s);
  });
  if(cur.length)groups.push(cur);
  el.innerHTML='';
  return groups.map(function(g){
    var mask=document.createElement('div');
    mask.style.cssText='overflow:hidden;display:block';
    var line=document.createElement('div');
    line.className='split-line';
    g.forEach(function(s){line.appendChild(s);});
    mask.appendChild(line);
    el.appendChild(mask);
    return line;
  });
}
// ── scroll reveal ──
function initReveal(){
  // Simple fade+y for .rev elements
  gsap.utils.toArray('.rev:not(.gsap-init)').forEach(function(el){
    el.classList.add('gsap-init');
    var delay=el.classList.contains('d3')?0.3:el.classList.contains('d2')?0.2:el.classList.contains('d1')?0.1:0;
    gsap.fromTo(el,
      {opacity:0,y:36},
      {opacity:1,y:0,duration:0.75,delay:delay,ease:'power3.out',
        scrollTrigger:{trigger:el,start:'top 91%',toggleActions:'play none none none'}}
    );
  });

  // Line reveal for section headings (.cb-h)
  gsap.utils.toArray('.cb-h:not(.split-init)').forEach(function(el){
    el.classList.add('split-init');
    var lines=splitByLines(el);
    gsap.from(lines,{
      yPercent:105,duration:0.7,ease:'expo.out',stagger:0.065,
      scrollTrigger:{trigger:el,start:'top 88%',toggleActions:'play none none none'}
    });
  });

  // Line reveal for key insights (.cb-insight) — deferred via fonts.ready + rAF
  // so getBoundingClientRect() sees correct rendered line positions
  gsap.utils.toArray('.cb-insight:not(.split-init)').forEach(function(el){
    el.classList.add('split-init');
    ScrollTrigger.create({
      trigger:el,start:'top 88%',once:true,
      onEnter:function(){
        gsap.set(el,{opacity:0});
        (document.fonts?document.fonts.ready:Promise.resolve()).then(function(){
          requestAnimationFrame(function(){
            var lines=splitByLines(el);
            gsap.set(el,{opacity:1});
            if(lines.length>1){
              gsap.from(lines,{yPercent:105,duration:0.65,ease:'power3.out',stagger:0.05});
            }else{
              gsap.from(el,{opacity:0,y:12,duration:0.6,ease:'power3.out'});
            }
          });
        });
      }
    });
  });

  document.querySelectorAll('[data-carousel]:not(.car-init)').forEach(function(wrap){
    wrap.classList.add('car-init');
    var track=wrap.querySelector('.cb-carousel-track');
    var REAL=5,GAP=16,SPEED=1.8;
    var currentSpeed=0,targetSpeed=SPEED,offset=0,slideCache=0;
    function slideW(){
      if(!slideCache){var s=track.querySelector('.cb-carousel-slide');slideCache=s?s.getBoundingClientRect().width:900;}
      return slideCache;
    }
    window.addEventListener('resize',function(){slideCache=0;},{passive:true});
    function loopW(){return(slideW()+GAP)*REAL;}
    (function tick(){
      currentSpeed+=(targetSpeed-currentSpeed)*0.06;
      offset+=currentSpeed;
      var lw=loopW();
      if(lw>0&&offset>=lw)offset-=lw;
      track.style.transform='translateX('+(-offset)+'px)';
      requestAnimationFrame(tick);
    })();
    wrap.addEventListener('mouseenter',function(){targetSpeed=0;});
    wrap.addEventListener('mouseleave',function(){targetSpeed=SPEED;});
  });

  // Parallax on hero image
  gsap.utils.toArray('.case-visual:not(.case-visual--placeholder) .cv-img').forEach(function(img){
    var wrap=img.closest('.case-visual');
    if(!wrap) return;
    gsap.fromTo(img,
      {y:-30},
      {y:30,ease:'none',scrollTrigger:{trigger:wrap,start:'top bottom',end:'bottom top',scrub:true}}
    );
  });
  // Parallax on body images
  gsap.utils.toArray('.cb-img-wrap .cv-img').forEach(function(img){
    var wrap=img.closest('.cb-img-wrap');
    if(!wrap) return;
    gsap.fromTo(img,
      {y:-35},
      {y:35,ease:'none',scrollTrigger:{trigger:wrap,start:'top bottom',end:'bottom top',scrub:true}}
    );
  });

  // Build ordered gallery: hero img first, then body images in DOM order
  function buildGallery(){
    var urls=[];
    var heroEl=document.querySelector('.case-visual source')||document.querySelector('.case-visual img');
    if(heroEl)urls.push(heroEl.tagName==='SOURCE'?heroEl.srcset:heroEl.src);
    document.querySelectorAll('.cb-img-wrap').forEach(function(wrap){
      var el=wrap.querySelector('source')||wrap.querySelector('img');
      if(el)urls.push(el.tagName==='SOURCE'?el.srcset:el.src);
    });
    return urls;
  }

  var FINE=window.matchMedia('(pointer:fine)').matches;

  // Hero click (img/source only — not video)
  var heroEl=document.querySelector('.case-visual source')||document.querySelector('.case-visual img');
  if(heroEl){
    var heroWrap=heroEl.closest('.case-visual');
    if(FINE)heroWrap.style.cursor='none';
    heroWrap.addEventListener('click',function(){openImgLightbox(buildGallery(),0);});
  }

  // Body image clicks
  var hasHero=!!heroEl;
  document.querySelectorAll('.cb-img-wrap').forEach(function(wrap,i){
    if(FINE)wrap.style.cursor='none';
    wrap.addEventListener('click',function(){
      openImgLightbox(buildGallery(),hasHero?i+1:i);
    });
  });

  function openImgLightbox(urls,startIdx){
    var idx=startIdx||0;
    var multi=urls.length>1;
    var ARR_PREV='<svg width="10" height="17" fill="none" viewBox="0 0 10 17"><path d="M9 1L1 8.5 9 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    var ARR_NEXT='<svg width="10" height="17" fill="none" viewBox="0 0 10 17"><path d="M1 1l8 7.5L1 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    var lb=document.createElement('div');
    lb.id='img-lb';
    lb.innerHTML=
      '<div class="lb-bg"></div>'
      +'<button class="lb-close" aria-label="Close"><svg width="14" height="14" fill="none" viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5"/></svg></button>'
      +(multi?'<button class="lb-prev" aria-label="Previous">'+ARR_PREV+'</button>':'')
      +'<img class="lb-img" src="" alt="">'
      +(multi?'<button class="lb-next" aria-label="Next">'+ARR_NEXT+'</button>':'')
      +(multi?'<div class="lb-count"></div>':'');
    document.body.appendChild(lb);

    var lbImg=lb.querySelector('.lb-img');
    var prevBtn=lb.querySelector('.lb-prev');
    var nextBtn=lb.querySelector('.lb-next');
    var countEl=lb.querySelector('.lb-count');

    function updateNav(){
      if(prevBtn){idx===0?prevBtn.setAttribute('hidden',''):prevBtn.removeAttribute('hidden');}
      if(nextBtn){idx===urls.length-1?nextBtn.setAttribute('hidden',''):nextBtn.removeAttribute('hidden');}
      if(countEl)countEl.textContent=(idx+1)+' / '+urls.length;
    }

    function showImage(newIdx,animate){
      idx=Math.max(0,Math.min(urls.length-1,newIdx));
      updateNav();
      if(animate){
        lbImg.classList.add('lb-fade');
        lbImg.style.transform='translate(0,0)';
        setTimeout(function(){
          lbImg.src=urls[idx];
          requestAnimationFrame(function(){lbImg.classList.remove('lb-fade');});
        },180);
      } else {
        lbImg.src=urls[idx];
      }
    }

    showImage(idx,false);
    requestAnimationFrame(function(){lb.classList.add('lb-on');});

    // Mouse pan
    lb.addEventListener('mousemove',function(e){
      var r=lb.getBoundingClientRect();
      var nx=(e.clientX-r.left)/r.width-0.5;
      var ny=(e.clientY-r.top)/r.height-0.5;
      var overX=Math.max(0,lbImg.offsetWidth-r.width)/2;
      var overY=Math.max(0,lbImg.offsetHeight-r.height)/2;
      lbImg.style.transform='translate('+(-nx*overX*2)+'px,'+(-ny*overY*2)+'px)';
    });
    lb.addEventListener('mouseleave',function(){lbImg.style.transform='translate(0,0)';});

    // Close
    function close(){
      lb.classList.remove('lb-on');
      lb.addEventListener('transitionend',function(){lb.remove();},{once:true});
      document.removeEventListener('keydown',onKey);
    }
    lb.addEventListener('click',function(e){
      if(!e.target.closest('.lb-img,.lb-prev,.lb-next'))close();
    });
    lb.querySelector('.lb-close').addEventListener('click',function(e){e.stopPropagation();close();});

    // Keyboard
    function onKey(e){
      if(e.key==='Escape')close();
      else if(e.key==='ArrowRight'&&multi)showImage(idx+1,true);
      else if(e.key==='ArrowLeft'&&multi)showImage(idx-1,true);
    }
    document.addEventListener('keydown',onKey);

    // Prev/next button clicks
    if(prevBtn)prevBtn.addEventListener('click',function(e){e.stopPropagation();showImage(idx-1,true);});
    if(nextBtn)nextBtn.addEventListener('click',function(e){e.stopPropagation();showImage(idx+1,true);});

    // Touch swipe
    var touchX=null;
    lb.addEventListener('touchstart',function(e){touchX=e.touches[0].clientX;},{passive:true});
    lb.addEventListener('touchend',function(e){
      if(touchX===null)return;
      var dx=e.changedTouches[0].clientX-touchX;
      if(Math.abs(dx)>50&&multi){dx<0?showImage(idx+1,true):showImage(idx-1,true);}
      touchX=null;
    });
  }
}

// ── case page entrance animation ──
// isTransition=false → initial page load (also animates #btn-back)
// isTransition=true  → case-to-case switch (btn-back stays visible)
function enterAnimation(isTransition){
  var tl=gsap.timeline();
  var t0=isTransition?0:0.12;
  if(!isTransition){
    tl.from('#btn-back',{opacity:0,x:-18,duration:0.5,ease:'power3.out'},0);
  }

  // Tags, tagline, stats, visual — simple fade+y (unchanged)
  tl
    .from('.ctag',        {opacity:0,y:10,stagger:0.055,duration:0.38,ease:'power2.out'},t0)
    .from('.case-tagline',{opacity:0,y:18,duration:0.5, ease:'power3.out'},t0+0.42)
    .from('.cstat',       {opacity:0,y:12,stagger:0.08, duration:0.42,ease:'power2.out'},t0+0.54)
    .from('.case-visual', {opacity:0,scale:0.965,duration:0.65,ease:'power3.out'},t0+0.68);

  // .case-h — line reveal
  var caseH=document.querySelector('.case-h');
  if(caseH){
    var hLines=splitByLines(caseH);
    tl.from(hLines,{
      yPercent:105,duration:0.75,ease:'expo.out',stagger:0.08
    },t0+0.14);
  }

  tl.call(demoKpiHint,null,t0+1.1);

  return tl;
}

// ── KPI block self-fix demo: nudge one block, let Anton fix it (once per session) ──
function demoKpiHint(){
  if(RM||!window.matchMedia('(pointer:fine)').matches||!window.figmaQueueFix)return;
  if(sessionStorage.getItem('kpiHint'))return;
  sessionStorage.setItem('kpiHint','1');
  var stats=document.querySelectorAll('.cstat');
  if(!stats.length)return;
  var el=stats[Math.floor(Math.random()*stats.length)];
  gsap.set(el,{y:16});
  window.figmaQueueFix({el:el,kind:'move'});
}

// ── picture element helper — emits <picture> with WebP + PNG fallback ──
function picTag(src,cls,alt){
  if(/\.webp$/i.test(src)){
    var png=src.replace('/web/','/raw/').replace(/\.webp$/i,'.png');
    return'<picture><source srcset="'+src+'" type="image/webp"><img class="'+cls+'" src="'+png+'" alt="'+alt+'" loading="lazy"></picture>';
  }
  return'<img class="'+cls+'" src="'+src+'" alt="'+alt+'" loading="lazy">';
}

// ── safe text: escape HTML, allow only <strong> ──
function safe(str){
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/&lt;strong&gt;/g,'<strong>')
    .replace(/&lt;\/strong&gt;/g,'</strong>');
}

// ── render case ──
function renderCase(idx){
  var c=CASES[idx];

  // Update page title and og meta
  document.title=c.title+' — Anton Alekseev';
  document.querySelector('meta[property="og:title"]').setAttribute('content',c.title+' — Anton Alekseev');
  document.querySelector('meta[name="description"]').setAttribute('content',c.tagline);

  var html='<div class="case-hero">'
    +'<div class="case-meta-row">'+c.tags.map(function(t){return'<span class="ctag">'+safe(t)+'</span>';}).join('')+'</div>'
    +'<h1 class="case-h">'+safe(c.title)+'</h1>'
    +'<p class="case-tagline">'+safe(c.tagline)+'</p>'
    +'<div class="case-stats">'+c.stats.map(function(s,i){return'<div class="cstat"><div class="kpi-lbl"><svg width="9" height="9" viewBox="0 0 9 9" fill="none" aria-hidden="true"><rect x=".5" y=".5" width="8" height="8" rx="1" stroke="currentColor" stroke-opacity=".6"/><line x1="4.5" y1="0" x2="4.5" y2="9" stroke="currentColor" stroke-opacity=".35"/><line x1="0" y1="4.5" x2="9" y2="4.5" stroke="currentColor" stroke-opacity=".35"/></svg>kpi-block-'+String(i+1).padStart(3,'0')+'</div><div class="cstat-n">'+safe(s.n)+'</div><div class="cstat-l">'+safe(s.l).replace('\n','<br>')+'</div></div>';}).join('')+'</div>'
    +'</div>';

  var hasHero=c.image||c.video;
  html+='<div class="case-visual'+(hasHero?'':' case-visual--placeholder')+'" style="'+(hasHero?'':'background:'+CASE_BG[idx])+'">'
    +(c.video
      ? '<video class="cv-img" src="'+c.video+'" autoplay muted playsinline onended="var v=this;setTimeout(function(){v.play()},3000)"></video>'
      : c.image
        ? picTag(c.image,'cv-img',safe(c.title)+' interface screenshot')
        : '<div class="case-visual-grid"></div><div class="case-visual-num"><span>0'+(idx+1)+'</span></div>')
    +'</div>';

  html+='<div class="case-body">';
  c.sections.forEach(function(sec){
    html+='<div class="cb-sec">';
    if(sec.lbl)html+='<div class="cb-label rev">'+safe(sec.lbl)+'</div>';
    // .cb-insight and .cb-h get NO .rev — handled by splitByLines in initReveal()
    if(sec.insight) html+='<div class="cb-insight">'+safe(sec.insight)+'</div>';
    if(sec.h) html+='<h2 class="cb-h">'+safe(sec.h)+'</h2>';
    if(sec.body) sec.body.split('\n\n').forEach(function(p){html+='<p class="cb-p rev">'+safe(p).replace(/\n/g,'<br>')+'</p>';});
    if(sec.images) sec.images.forEach(function(im){html+='<div class="cb-img-wrap rev">'+picTag(im.src,'cv-img',safe(im.alt||sec.lbl))+'</div>';});
    if(sec.carousel){
      var slides=sec.carousel.concat(sec.carousel);
      html+='<div class="cb-carousel-wrap" data-carousel><div class="cb-carousel-track">';
      slides.forEach(function(s){html+='<div class="cb-carousel-slide">'+picTag(s,'cb-carousel-img','')+'</div>';});
      html+='</div></div>';
    }
    if(sec.bullets) html+='<ul class="cb-bullets rev">'+sec.bullets.map(function(b){return'<li>'+safe(b)+'</li>';}).join('')+'</ul>';
    if(sec.steps) html+='<div class="cb-steps rev">'+sec.steps.map(function(s){return'<div class="cb-step"><div class="cb-step-n">'+safe(s.n)+'</div><div class="cb-step-t">'+safe(s.t)+'</div><div class="cb-step-d">'+safe(s.d)+'</div></div>';}).join('')+'</div>';
    if(sec.diagram) html+='<div class="cb-diagram rev">'+safe(sec.diagram)+'</div>';
    if(sec.impacts) html+='<div class="cb-impacts rev">'+sec.impacts.map(function(im){return'<div class="cb-impact"><div class="cb-impact-n '+safe(im.c)+'">'+safe(im.n)+'</div><div class="cb-impact-l">'+safe(im.l).replace('\n','<br>')+'</div></div>';}).join('')+'</div>';
    if(sec.reflection) html+='<div class="cb-reflection rev"><div class="cb-reflection-lbl">Reflection</div>'+sec.reflection.split('\n\n').map(function(p){return'<p>'+safe(p)+'</p>';}).join('')+'</div>';
    html+='</div>';
  });

  html+='<div class="cb-nav">';
  if(typeof c.prev==='number'){
    html+='<div class="cb-nav-btn" id="btn-prev"><div class="cb-nav-lbl">← Prev</div><div class="cb-nav-t">'+safe(c.prevT)+'</div></div>';
  }else{html+='<div></div>';}
  if(typeof c.next==='number'){
    html+='<div class="cb-nav-btn" id="btn-next" style="text-align:right"><div class="cb-nav-lbl">Next →</div><div class="cb-nav-t">'+safe(c.nextT)+'</div></div>';
  }else{html+='<div></div>';}
  html+='</div></div>';

  document.getElementById('case-content').innerHTML=html;

  var prevBtn=document.getElementById('btn-prev');
  var nextBtn=document.getElementById('btn-next');
  [prevBtn,nextBtn].forEach(function(btn){
    if(!btn)return;
    btn.setAttribute('tabindex','0');
    btn.setAttribute('role','link');
    btn.addEventListener('keydown',function(e){
      if(e.key==='Enter'||e.key===' '){e.preventDefault();btn.click();}
    });
  });
  if(prevBtn){
    (function(pi){prevBtn.addEventListener('click',function(){window.location.href='case.html#'+pi;});})(c.prev);
  }
  if(nextBtn){
    (function(ni){nextBtn.addEventListener('click',function(){window.location.href='case.html#'+ni;});})(c.next);
  }

  initReveal();
  if(window.initFigmaDrag)initFigmaDrag();
}

// ── case-to-case transition via hashchange ──
// Fires when prev/next changes the hash without a full page reload
window.addEventListener('hashchange',function(){
  var raw=window.location.hash.replace('#','');
  var newIdx=parseInt(raw,10);
  if(isNaN(newIdx)||newIdx<0||newIdx>=CASES.length)return;
  // Exit current content
  gsap.to('#case-content',{opacity:0,y:-22,duration:0.28,ease:'power2.in',
    onComplete:function(){
      ScrollTrigger.getAll().forEach(function(t){t.kill();});
      var vid=document.querySelector('.case-visual video');
      if(vid){vid.onended=null;vid.pause();}
      smoother.scrollTop(0);
      renderCase(newIdx);
      gsap.set('#case-content',{opacity:1,y:0});
      enterAnimation(true);
    }
  });
});

// ── init from URL hash (#N) with query-string fallback (?id=N) ──
var rawId=window.location.hash.replace('#','');
if(!rawId){rawId=new URLSearchParams(window.location.search).get('id')||'';}
var idx=parseInt(rawId,10);
if(isNaN(idx)||idx<0||idx>=CASES.length){
  window.location.href='index.html';
}else{
  renderCase(idx);
  enterAnimation(false);
}

})();
</script>
